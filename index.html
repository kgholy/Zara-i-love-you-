<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для тебя ❤️</title>

<style>
body{
margin:0;
position:relative;
overflow:hidden;
min-height:100vh;
background:linear-gradient(to bottom,#ffdce6,#fff0f5);
font-family:Arial,sans-serif;
text-align:center;
color:#5a3a42;
}

.content{
position:relative;
z-index:2;
width:100%;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
box-sizing:border-box;
}

h1{
font-size:32px;
margin-bottom:15px;
}

p{
font-size:18px;
max-width:500px;
}

a{
margin-top:25px;
padding:15px 35px;
background:#ff8fab;
color:white;
text-decoration:none;
border-radius:30px;
font-size:20px;
}

.heart{
position:fixed;
top:-10px;
z-index:1;
pointer-events:none;
color:#ff8fab;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="music/song.mp3" type="audio/mp3">
</audio>

<div class="content">
<h1 id="typing"></h1>
<p>Маленькое путешествие, которое я сделал только для тебя</p>
<a href="page1.html">Начать</a>
</div>

<script>
const text = "У меня есть кое-что для тебя ❤️";
let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,100);
}
}
typeWriter();

function createHeart(){
const heart = document.createElement("div");
heart.className = "heart";
heart.innerHTML = "❤";

heart.style.left = Math.random() * window.innerWidth + "px";
heart.style.fontSize = (15 + Math.random()*20) + "px";
heart.style.animationDuration = (4 + Math.random()*3) + "s";

document.body.appendChild(heart);

setTimeout(() => {
heart.remove();
}, 7000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
