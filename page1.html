<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Почему ты особенная</title>

<style>
body{
margin:0;
position:relative;
overflow:hidden;
min-height:100vh;
background:#fff0f5;
font-family:Arial,sans-serif;
text-align:center;
}

.content{
position:relative;
z-index:2;
width:100%;
padding:40px 20px;
box-sizing:border-box;
}

p{
font-size:20px;
margin:20px 0;
color:#5a3a42;
}

a{
font-size:40px;
text-decoration:none;
color:#ff8fab;
}

.heart{
position:fixed;
top:-10px;
z-index:1;
pointer-events:none;
color:#ff8fab;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div class="content">
<h1>Почему ты особенная 🌸</h1>

<p>Ты умеешь делать обычные моменты особенными</p>
<p>С тобой спокойно даже в хаосе</p>
<p>В тебе есть что-то, к чему хочется возвращаться</p>
<p>Ты делаешь этот мир мягче</p>

<br><br>
<a href="page2.html">➡</a>
</div>

<script>
function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.fontSize=(15+Math.random()*20)+"px";
heart.style.animationDuration=(4+Math.random()*3)+"s";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},7000);
}
setInterval(createHeart,400);
</script>

</body>
</html>
