<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Если тебе грустно</title>

<style>
body{
margin:0;
position:relative;
overflow:hidden;
min-height:100vh;
background:#ffeaf1;
font-family:Arial,sans-serif;
text-align:center;
}

.content{
position:relative;
z-index:2;
padding:40px 20px;
}

button{
padding:15px 20px;
margin:10px;
border:none;
border-radius:25px;
background:#ff8fab;
color:white;
font-size:16px;
}

#message{
margin-top:20px;
font-size:20px;
color:#5a3a42;
}

a{
font-size:40px;
text-decoration:none;
color:#ff8fab;
}

.heart{
position:fixed;
top:-10px;
z-index:1;
pointer-events:none;
color:#ff8fab;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<div class="content">
<h1>Если тебе грустно...</h1>

<button onclick="showText('miss')">Если скучаешь</button>
<button onclick="showText('sad')">Если грустно</button>
<button onclick="showText('smile')">Если хочешь улыбнуться</button>

<p id="message"></p>

<br><br>
<a href="final.html">➡</a>
</div>

<script>
function showText(type){
let text="";

if(type=="miss") text="Если скучаешь — знай, что наша связь никуда не исчезает, даже когда мы не рядом. Всё хорошее между нами остаётся с тобой ❤️";

if(type=="sad") text="Если тебе тяжело, помни: ты не одна. Даже в самые сложные дни есть тот, кто искренне переживает за тебя и хочет видеть тебя счастливой.";

if(type=="smile") text="Если хочешь улыбнуться — просто вспомни, сколько в тебе тепла, нежности и света. Иногда этого уже достаточно, чтобы день стал лучше 🌸";

document.getElementById("message").innerText=text;
}

function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.fontSize=(15+Math.random()*20)+"px";
heart.style.animationDuration=(4+Math.random()*3)+"s";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},7000);
}
setInterval(createHeart,400);
</script>

</body>
</html>
