<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наши моменты</title>

<style>
body{
margin:0;
position:relative;
overflow-x:hidden;
overflow-y:auto;
min-height:100vh;
background:#ffe4ec;
font-family:Arial,sans-serif;
text-align:center;
}

.content{
position:relative;
z-index:2;
padding:30px;
padding-bottom:100px;
}

h1{
font-size:28px;
color:#5a3a42;
margin-bottom:20px;
}

img{
width:90%;
max-width:300px;
border-radius:20px;
margin:15px 0;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

a{
font-size:40px;
text-decoration:none;
color:#ff8fab;
display:block;
margin-top:30px;
}

.heart{
position:fixed;
top:-10px;
z-index:1;
pointer-events:none;
color:#ff8fab;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}
</style>
</head>

<body>

<div class="content">
<h1>Наши моменты 📸</h1>

<img src="photos/photo1.jpg" alt="Фото 1">
<img src="photos/photo2.jpg" alt="Фото 2">
<img src="photos/photo3.jpg" alt="Фото 3">

<a href="page3.html">➡</a>
</div>

<script>
function createHeart(){
const heart = document.createElement("div");
heart.className = "heart";
heart.innerHTML = "❤";

heart.style.left = Math.random() * window.innerWidth + "px";
heart.style.fontSize = (15 + Math.random()*20) + "px";
heart.style.animationDuration = (4 + Math.random()*3) + "s";

document.body.appendChild(heart);

setTimeout(() => {
heart.remove();
}, 7000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
